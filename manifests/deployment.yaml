apiVersion: v1
kind: Namespace
metadata:
  name: java
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: java
  name: java-example
  labels:
    app: java-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-example
  template:
    metadata:
      labels:
        app: java-example
    spec:
      containers:
      - image: tkgregory/sample-metrics-application:latest
        imagePullPolicy: Always
        name: java-example
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  namespace: java
  name: java-service
  labels:                    
    app: java-example
spec:
  selector:
    app: java-example
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
